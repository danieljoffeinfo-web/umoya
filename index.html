<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Umoya — African Spirit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --navy:#1a1f4e;
    --navy-deep:#161a44;
    --cream:#f0ebe1;
    --cream-2:#e8e1d3;
    --yellow:#f5c518;
    --yellow-2:#ffd530;
    --coral:#ff6b6b;
    --red:#e63946;
    --blue:#2b3a8c;
    --ink:#0f1338;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Archivo', system-ui, sans-serif;
    background:var(--cream);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .display{font-family:'Archivo Black','Archivo',sans-serif;letter-spacing:-0.02em;line-height:0.92}
  .eyebrow{font-weight:700;letter-spacing:0.18em;text-transform:uppercase;font-size:13px}
  .caps{letter-spacing:0.18em;text-transform:uppercase;font-weight:600}
</style>

<template id="__bundler_thumbnail" data-bg-color="#f0ebe1">
  <svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- bg -->
    <rect width="800" height="1000" fill="#f0ebe1"/>
    <!-- navy header band -->
    <rect width="800" height="80" fill="#1a1f4e"/>
    <!-- tribal triangles -->
    <polygon points="400,0 800,0 600,280" fill="#ff6b6b"/>
    <polygon points="600,280 800,280 700,420" fill="#2b3a8c"/>
    <polygon points="400,0 600,280 200,280" fill="#f5c518"/>
    <!-- yellow circle -->
    <circle cx="400" cy="480" r="220" fill="#f5c518" stroke="#1a1f4e" strokeWidth="10"/>
    <!-- navy feature band -->
    <rect y="720" width="800" height="80" fill="#1a1f4e"/>
    <!-- yellow movement block -->
    <rect y="820" width="800" height="180" fill="#f5c518"/>
    <!-- logo wordmark hint -->
    <text x="400" y="46" textAnchor="middle" fontFamily="sans-serif" fontWeight="900" fontSize="32" fill="#f0ebe1">UMOYA</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

/* ---------- Decorative pattern (tribal geometric) ---------- */
function TribalPattern({ variant = "right", className = "", style = {} }) {
  // A composition of triangles/chevrons in navy/yellow/coral/red/blue/cream
  return (
    <svg viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice"
         className={className} style={{ display:"block", ...style }}>
      <defs>
        <pattern id="chev" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
          {/* big chevron block */}
          <rect width="120" height="120" fill="#f0ebe1"/>
          <polygon points="0,0 60,0 30,52" fill="#1a1f4e"/>
          <polygon points="60,0 120,0 90,52" fill="#ff6b6b"/>
          <polygon points="0,60 60,60 30,112" fill="#2b3a8c"/>
          <polygon points="60,60 120,60 90,112" fill="#f5c518"/>
          <polygon points="30,52 90,52 60,104" fill="#e63946"/>
        </pattern>
        <pattern id="tri" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
          <rect width="80" height="80" fill="transparent"/>
          <polygon points="0,0 40,0 20,34" fill="#1a1f4e"/>
          <polygon points="40,0 80,0 60,34" fill="#ff6b6b"/>
          <polygon points="20,34 60,34 40,68" fill="#f5c518"/>
          <polygon points="0,40 20,40 10,74" fill="#2b3a8c"/>
          <polygon points="60,40 80,40 70,74" fill="#e63946"/>
        </pattern>
      </defs>
      {/* hand-composed shapes for visual interest */}
      <g>
        <rect x="0" y="0" width="600" height="600" fill="#f0ebe1"/>
        {/* clusters of triangles */}
        <polygon points="40,40 180,40 110,180" fill="#1a1f4e"/>
        <polygon points="180,40 320,40 250,180" fill="#ff6b6b"/>
        <polygon points="320,40 460,40 390,180" fill="#2b3a8c"/>
        <polygon points="460,40 600,40 530,180" fill="#f5c518"/>

        <polygon points="110,180 250,180 180,320" fill="#f5c518"/>
        <polygon points="250,180 390,180 320,320" fill="#1a1f4e"/>
        <polygon points="390,180 530,180 460,320" fill="#e63946"/>

        <polygon points="40,320 180,320 110,460" fill="#ff6b6b"/>
        <polygon points="180,320 320,320 250,460" fill="#f5c518"/>
        <polygon points="320,320 460,320 390,460" fill="#2b3a8c"/>
        <polygon points="460,320 600,320 530,460" fill="#1a1f4e"/>

        <polygon points="110,460 250,460 180,600" fill="#1a1f4e"/>
        <polygon points="250,460 390,460 320,600" fill="#e63946"/>
        <polygon points="390,460 530,460 460,600" fill="#f5c518"/>

        {/* small accent triangles */}
        <polygon points="60,210 90,210 75,240" fill="#2b3a8c"/>
        <polygon points="540,90 570,90 555,120" fill="#e63946"/>
        <polygon points="200,500 230,500 215,530" fill="#f5c518"/>
        <polygon points="430,260 460,260 445,290" fill="#ff6b6b"/>

        {/* inverted small triangles */}
        <polygon points="150,260 180,260 165,230" fill="#f5c518"/>
        <polygon points="480,400 510,400 495,370" fill="#ff6b6b"/>
        <polygon points="280,140 310,140 295,110" fill="#2b3a8c"/>
      </g>
    </svg>
  );
}

/* ---------- Logo ---------- */
function Logo({ light = false, size = 42 }) {
  const ink = light ? "#f0ebe1" : "#1a1f4e";
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",lineHeight:1}}>
      <div style={{display:"flex",alignItems:"center",gap:2}}>
        <span className="display" style={{fontSize:size, color:ink, letterSpacing:"-0.01em"}}>UM</span>
        {/* O with sun */}
        <span style={{
          width:size*0.78, height:size*0.78, borderRadius:"50%",
          border:`${Math.max(2,size*0.08)}px solid ${ink}`,
          display:"inline-flex",alignItems:"center",justifyContent:"center",
          marginInline:1, position:"relative", top: size*0.04,
        }}>
          <span style={{
            width:size*0.42, height:size*0.42, borderRadius:"50%",
            background:"var(--yellow)", display:"block",
            boxShadow:`0 0 0 ${Math.max(1,size*0.04)}px ${ink}`,
            position:"relative",
          }}>
            <svg viewBox="0 0 40 40" style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
              {Array.from({length:12}).map((_,i)=>{
                const a = (i/12)*Math.PI*2;
                const x1 = 20+Math.cos(a)*12, y1 = 20+Math.sin(a)*12;
                const x2 = 20+Math.cos(a)*18, y2 = 20+Math.sin(a)*18;
                return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={ink} strokeWidth="1.4" strokeLinecap="round"/>
              })}
            </svg>
          </span>
        </span>
        <span className="display" style={{fontSize:size, color:ink, letterSpacing:"-0.01em"}}>YA</span>
        <span style={{fontSize:size*0.22, color:ink, marginLeft:2, marginTop:-size*0.4}}>®</span>
      </div>
      <div style={{
        fontSize:size*0.18, color:ink, letterSpacing:"0.42em",
        marginTop:size*0.12, fontWeight:600, paddingLeft:"0.42em",
        whiteSpace:"nowrap"
      }}>AFRICAN SPIRIT</div>
    </div>
  );
}

/* ---------- Header ---------- */
function Header() {
  return (
    <header style={{
      position:"relative", zIndex:5,
      padding:"22px 48px",
      display:"grid", gridTemplateColumns:"1fr auto 1fr", alignItems:"center",
      borderBottom:"1px solid rgba(26,31,78,0.08)",
    }}>
      <div style={{display:"flex",alignItems:"center"}}>
        <button aria-label="Menu" style={{padding:8}}>
          <svg width="26" height="20" viewBox="0 0 26 20"><g stroke="#1a1f4e" strokeWidth="2.4" strokeLinecap="round">
            <line x1="2" y1="3" x2="24" y2="3"/><line x1="2" y1="10" x2="24" y2="10"/><line x1="2" y1="17" x2="24" y2="17"/>
          </g></svg>
        </button>
      </div>
      <div style={{justifySelf:"center"}}>
        <Logo size={34}/>
      </div>
      <nav style={{justifySelf:"end", display:"flex", alignItems:"center", gap:36}}>
        <a href="#" className="caps" style={{color:"var(--navy)", fontSize:13}}>Shop</a>
        <a href="#" className="caps" style={{color:"var(--navy)", fontSize:13}}>About</a>
        <a href="#" className="caps" style={{color:"var(--navy)", fontSize:13}}>Story</a>
        <button aria-label="Cart" style={{padding:6, position:"relative"}}>
          <svg width="22" height="24" viewBox="0 0 22 24" fill="none" stroke="#1a1f4e" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M3 7h16l-1.5 13a2 2 0 0 1-2 1.8H6.5a2 2 0 0 1-2-1.8L3 7z"/>
            <path d="M7 7V5a4 4 0 0 1 8 0v2"/>
          </svg>
        </button>
      </nav>
    </header>
  );
}

/* ---------- Necklace SVG (placeholder pendants) ---------- */
function Necklace({ kind = "giraffe", color = "#cfd1d6", bg = "transparent", chainLen = 110 }) {
  // returns an SVG with chain + pendant
  return (
    <svg viewBox="0 0 240 280" style={{width:"100%",height:"100%"}}>
      {bg !== "transparent" && <rect width="240" height="280" fill={bg}/>}
      {/* chain - two arcs going up to corners */}
      <g fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round">
        <path d={`M120 ${chainLen} C 80 80, 40 30, 8 6`} strokeDasharray="3 3"/>
        <path d={`M120 ${chainLen} C 160 80, 200 30, 232 6`} strokeDasharray="3 3"/>
      </g>
      {/* bail */}
      <g fill="none" stroke={color} strokeWidth="2.4">
        <path d="M115 105 C 115 96, 125 96, 125 105 L 125 116 L 115 116 Z"/>
      </g>
      {/* pendant */}
      <g transform="translate(120,170)" fill="none" stroke={color} strokeWidth="2.6" strokeLinejoin="round" strokeLinecap="round">
        {kind === "giraffe" && (
          <g>
            {/* tall giraffe silhouette - outline */}
            <path d="M-6 -54
                     C -10 -56, -10 -62, -4 -62
                     C -2 -62, -1 -64, 0 -66
                     C 1 -64, 2 -62, 4 -62
                     C 8 -62, 9 -58, 7 -54
                     C 5 -52, 4 -50, 4 -46
                     C 4 -38, 8 -28, 12 -16
                     C 14 -8, 14 0, 12 8
                     C 11 14, 12 22, 14 30
                     C 16 38, 16 46, 14 52
                     L 8 52
                     C 8 46, 6 40, 6 32
                     C 6 24, 4 18, 2 14
                     C 0 10, -4 12, -6 18
                     C -8 26, -10 36, -10 44
                     C -10 48, -12 52, -14 52
                     L -18 52
                     C -18 44, -16 36, -14 28
                     C -12 18, -14 6, -16 -4
                     C -18 -14, -16 -24, -12 -32
                     C -10 -38, -8 -44, -8 -50
                     C -8 -52, -7 -53, -6 -54 Z"/>
            {/* small companion giraffe */}
            <path d="M-22 4
                     C -24 2, -24 -2, -20 -2
                     C -18 -2, -18 -4, -17 -6
                     C -16 -4, -15 -2, -13 -2
                     C -10 -2, -10 2, -12 4
                     C -14 8, -14 14, -12 20
                     C -10 28, -10 36, -12 44
                     C -13 48, -14 52, -16 52
                     L -20 52
                     C -20 46, -19 40, -20 34
                     C -22 28, -24 22, -24 14
                     C -24 10, -23 6, -22 4 Z"/>
          </g>
        )}
        {kind === "tree" && (
          <g>
            <circle r="34"/>
            {/* trunk */}
            <path d="M0 34 L0 12 M-4 16 L0 8 L4 16 M-7 4 L0 -4 L7 4 M-10 -8 L0 -16 L10 -8"/>
            <path d="M-14 0 C -22 -10, -10 -22, 0 -16"/>
            <path d="M14 0 C 22 -10, 10 -22, 0 -16"/>
            <path d="M-12 12 C -22 8, -22 -4, -14 -2"/>
            <path d="M12 12 C 22 8, 22 -4, 14 -2"/>
          </g>
        )}
        {kind === "africa" && (
          <g>
            {/* africa outline simplified */}
            <path d="M-14 -38
                     C -6 -40, 4 -40, 12 -36
                     C 18 -30, 22 -20, 24 -10
                     C 26 0, 22 12, 16 22
                     C 12 30, 8 36, 4 42
                     C 0 48, -4 50, -8 46
                     C -14 38, -18 30, -22 22
                     C -26 10, -28 -4, -24 -18
                     C -22 -28, -18 -34, -14 -38 Z"/>
            {/* heart cutout */}
            <path d="M-4 -8 C -6 -12, -2 -14, 0 -10 C 2 -14, 6 -12, 4 -8 C 2 -4, 0 -2, 0 0 C 0 -2, -2 -4, -4 -8 Z" fill={color} stroke="none"/>
          </g>
        )}
      </g>
    </svg>
  );
}

/* ---------- Hero ---------- */
function Hero() {
  return (
    <section style={{
      position:"relative",
      display:"grid", gridTemplateColumns:"1fr 1fr",
      minHeight: 600,
      overflow:"hidden",
    }}>
      {/* left copy */}
      <div style={{padding:"96px 48px 96px 80px", display:"flex", flexDirection:"column", justifyContent:"center"}}>
        <div className="eyebrow" style={{color:"var(--coral)", marginBottom:24}}>Sterling Silver</div>
        <h1 className="display" style={{fontSize:104, color:"var(--navy)", margin:0}}>
          AFRICAN<br/>SPIRIT
        </h1>
        <p style={{
          marginTop:28, marginBottom:36, maxWidth:360,
          fontSize:17, lineHeight:1.55, color:"var(--navy)",
          fontWeight:500,
        }}>
          Inspired by heritage. Crafted in<br/>sterling silver. Made to empower.
        </p>
        <div>
          <button className="caps" style={{
            background:"var(--navy)", color:"var(--cream)",
            padding:"18px 32px", borderRadius:999,
            fontSize:13, letterSpacing:"0.18em",
            transition:"transform .2s ease, background .2s ease",
          }}
          onMouseEnter={e=>{e.currentTarget.style.background="var(--ink)"}}
          onMouseLeave={e=>{e.currentTarget.style.background="var(--navy)"}}
          onMouseDown={e=>{e.currentTarget.style.transform="scale(.97)"}}
          onMouseUp={e=>{e.currentTarget.style.transform="scale(1)"}}
          >Shop Collection</button>
        </div>
      </div>

      {/* right image / pattern */}
      <div style={{position:"relative"}}>
        {/* tribal pattern background */}
        <div style={{
          position:"absolute", inset:0,
          clipPath:"polygon(0 0, 100% 0, 100% 100%, 22% 100%, 12% 88%, 0 88%)",
          background:"var(--cream)",
        }}>
          <TribalPattern style={{position:"absolute", inset:0, width:"100%", height:"100%"}}/>
        </div>

        {/* circular product framing */}
        <div style={{
          position:"absolute",
          top:"50%", left:"50%", transform:"translate(-50%,-50%)",
          width:"min(78%, 520px)", aspectRatio:"1/1",
          borderRadius:"50%",
          background:"var(--yellow)",
          border:"6px solid var(--navy)",
          boxShadow:"0 0 0 14px var(--cream)",
          display:"flex", alignItems:"center", justifyContent:"center",
          overflow:"hidden",
        }}>
          <div style={{width:"68%",height:"86%"}}>
            <Necklace kind="giraffe" color="#e6e8ec" chainLen={120}/>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ---------- Feature band ---------- */
function FeatureIcon({ kind }) {
  const stroke = "#f0ebe1";
  return (
    <div style={{
      width:48, height:48, borderRadius:"50%",
      border:`1.5px solid ${stroke}`,
      display:"flex", alignItems:"center", justifyContent:"center",
    }}>
      {kind==="heart" && (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--yellow)">
          <path d="M12 21s-7-4.5-7-11a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 6.5-7 11-7 11z"/>
        </svg>
      )}
      {kind==="sparkle" && (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f0ebe1" strokeWidth="1.6" strokeLinecap="round">
          <path d="M12 3 L13.6 10.4 L21 12 L13.6 13.6 L12 21 L10.4 13.6 L3 12 L10.4 10.4 Z" fill="#f0ebe1"/>
        </svg>
      )}
      {kind==="diamond" && (
        <svg width="22" height="20" viewBox="0 0 24 22" fill="var(--yellow)" stroke="var(--yellow)" strokeWidth="0.5" strokeLinejoin="round">
          <path d="M5 2 L19 2 L23 8 L12 21 L1 8 Z"/>
          <path d="M5 2 L9 8 L1 8 M19 2 L15 8 L23 8 M9 8 L12 21 L15 8 M9 8 L15 8" stroke="#1a1f4e" strokeWidth="0.6" fill="none"/>
        </svg>
      )}
    </div>
  );
}

function FeatureBand() {
  const items = [
    { icon:"heart", t1:"Authentic", t2:"Heritage" },
    { icon:"sparkle", t1:"Sterling", t2:"Silver" },
    { icon:"diamond", t1:"Crafted to", t2:"Empower" },
  ];
  return (
    <section style={{
      background:"var(--navy)", color:"var(--cream)",
      padding:"36px 96px",
      display:"grid", gridTemplateColumns:"1fr 1fr 1fr",
    }}>
      {items.map((it,i)=>(
        <div key={i} style={{
          display:"flex", alignItems:"center", gap:18,
          justifyContent:"center",
          borderLeft: i? "1px solid rgba(240,235,225,0.18)" : "none",
        }}>
          <FeatureIcon kind={it.icon}/>
          <div className="caps" style={{fontSize:13, lineHeight:1.35}}>
            {it.t1}<br/>{it.t2}
          </div>
        </div>
      ))}
    </section>
  );
}

/* ---------- Collection ---------- */
function ProductCard({ kind, name, price }) {
  return (
    <div style={{
      background:"#fff",
      borderRadius:14,
      padding:"28px 20px 24px",
      boxShadow:"0 1px 0 rgba(26,31,78,0.06)",
      display:"flex", flexDirection:"column", alignItems:"center",
      transition:"transform .25s ease, box-shadow .25s ease",
      cursor:"pointer",
    }}
    onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow="0 12px 30px rgba(26,31,78,0.10)";}}
    onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="0 1px 0 rgba(26,31,78,0.06)";}}
    >
      <div style={{width:"100%", aspectRatio:"4/5"}}>
        <Necklace kind={kind} color="#c9ccd2"/>
      </div>
      <div className="caps" style={{
        marginTop:8, fontSize:12, color:"var(--navy)", textAlign:"center", lineHeight:1.4
      }}>{name}</div>
      <div style={{marginTop:8, color:"var(--navy)", fontWeight:500, fontSize:14}}>{price}</div>
    </div>
  );
}

function Collection() {
  const products = [
    { kind:"giraffe", name:"Heritage Necklace", price:"$89" },
    { kind:"tree", name:"Roots Necklace", price:"$79" },
    { kind:"africa", name:"Africa Heart\nNecklace", price:"$79" },
  ];
  const [idx,setIdx] = useState(0);

  return (
    <section style={{
      padding:"96px 64px 110px",
      display:"grid", gridTemplateColumns:"minmax(240px, 320px) 1fr", gap:40, alignItems:"center",
      background:"var(--cream)",
    }}>
      <div>
        <div className="eyebrow" style={{color:"var(--coral)", marginBottom:18}}>The Collection</div>
        <h2 style={{
          fontFamily:"'Archivo',sans-serif", fontWeight:700,
          fontSize:46, lineHeight:1.0, color:"var(--navy)", margin:0,
          letterSpacing:"-0.02em",
        }}>
          Symbols of<br/>connection.
        </h2>
        <p style={{marginTop:22, color:"var(--navy)", fontSize:16, lineHeight:1.55, maxWidth:300}}>
          Each piece tells a story of love,<br/>strength, and unity.
        </p>
        <a href="#" className="caps" style={{
          display:"inline-flex", alignItems:"center", gap:14,
          marginTop:28, fontSize:13, color:"var(--navy)",
          paddingBottom:8, borderBottom:"1.5px solid var(--navy)",
        }}>
          Explore Collection
          <svg width="22" height="10" viewBox="0 0 22 10" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d="M1 5h19M16 1l4 4-4 4"/>
          </svg>
        </a>
      </div>

      <div style={{position:"relative"}}>
        <div style={{
          display:"grid", gridTemplateColumns:"repeat(3, minmax(0, 1fr))", gap:14,
          padding:"0 56px",
        }}>
          {products.map((p,i)=>(
            <ProductCard key={i} {...p}/>
          ))}
        </div>
        {/* arrows */}
        <button onClick={()=>setIdx(Math.max(0,idx-1))} aria-label="Previous" style={{
          position:"absolute", left:0, top:"50%", transform:"translateY(-50%)",
          width:42, height:42, borderRadius:"50%", background:"#fff",
          boxShadow:"0 6px 16px rgba(26,31,78,0.10)",
          display:"flex",alignItems:"center",justifyContent:"center",
        }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#1a1f4e" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M9 2 L4 7 L9 12"/>
          </svg>
        </button>
        <button onClick={()=>setIdx(idx+1)} aria-label="Next" style={{
          position:"absolute", right:0, top:"50%", transform:"translateY(-50%)",
          width:42, height:42, borderRadius:"50%", background:"#fff",
          boxShadow:"0 6px 16px rgba(26,31,78,0.10)",
          display:"flex",alignItems:"center",justifyContent:"center",
        }}>
